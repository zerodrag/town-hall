[package]
name = "town-hall-backend"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
axum = { version = "0.8", features = ["macros"] }
dotenvy = "0.15"
serde = { version = "1.0", features = ["derive"] }
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "time", "tls-rustls"] }
time = { version = "0.3.47", features = ["serde"] }
tokio = { version = "1.50", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
